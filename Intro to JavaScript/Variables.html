<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Sum of two numbers</h1>
    
    <p id="num1"></p>
    
    <p id="num2"></p>
    
    <p id="result"></p>
    
    <script>

        var a = 10

        var b = 15

        document.getElementById("num1").innerHTML = "Number1 : " + a

        document.getElementById("num2").innerHTML = "Number2 : " + b

        document.getElementById("result").innerHTML = "Sum : " + (a + b)

    </script>
</body>
</html>
