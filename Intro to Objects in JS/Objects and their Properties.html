<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Javascript Object and Properties</h3>
    <p id="demo"></p>
    <script>
        var person = {
            "name": "Fatima",
            "age": 12,
            "grade": "a",
            "color": "yellow"
        }
        document.getElementById("demo").innerHTML = person.name + "<br>" + person.age + "<br>" + person.grade + "<br>" + person.color;
    </script>
</body>

</html>
