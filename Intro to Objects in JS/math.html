<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

</head>

<body style="font-size: 25px;">

    <script>

        var round = Math.round(2.5)

        document.write(round, "<br>")

        var floor = Math.floor(4.5)

        document.write(floor, "<br>")

        var power = Math.pow(2, 4)

        document.write(power)

    </script>

</body>

</html>
