<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my botanical garden</title>
    <style>
        body {

            font-family: Arial, sans-serif;

            background: rgb(203, 231, 255);

            text-align: center;

            padding: 30px;

            font-size: 30px;

        }

        h1 {

            color: #ff4fe5;

        }

        #zoo {

            border: 2px solid #e3fa33;

            width: 300px;

            margin: 16px auto;

            padding: 12px;

            border-radius: 10px;

            background: white;

        }

        .zone {

            border: 1px solid #000000;

            margin: 6px 0;

            padding: 8px 12px;

            border-radius: 6px;

            text-align: left;

        }

        button {

            background: #edff49;

            color: rgb(0, 0, 0);

            padding: 10px 24px;

            border: none;

            border-radius: 20px;

            cursor: pointer;

        }
    </style>
</head>

<body>
    <h1>My botanical garden</h1>

    <p>Use JavaScript and the DOM to add flower to each cage!</p>

    <!--

DOM Tree: zoo is the parent element node.

Zone divs are child element nodes. Animal names inside each span are text nodes.

-->

    <div id="zoo">

        <div class="zone">Zone 1:

            <span id="zone1"></span>

        </div>

        <div class="zone">Zone 2: <span id="zone2"></span></div>

        <div class="zone">Zone 3: <span id="zone3"></span></div>

        <div class="zone">Total flower: <span id="total"></span></div>

    </div>

    <br>

    <button onclick="openZoo()">My botanical garden!</button>

    <p id="zoo-status"></p>

    <script>

        function openZoo() {

            /* Task 1: Add your first animal to Zone 1 */

            document.getElementById("zone1").innerHTML = "Lotus";

            /* Task 2: Add your second animal to Zone 2 */

            document.getElementById("zone2").innerHTML = "rose";

            /* Task 3: Add your third animal to Zone 3 */

            document.getElementById("zone3").innerHTML = "tulips";

            /* Task 4: Show the total number of flower */

            document.getElementById("total").innerHTML = "3";

            /* Task 5: Change the zoo background colour */

            document.getElementById("zoo").style.backgroundColor = "lightpink";

            /* Task 6: Use the document object to show the page title */

            document.getElementById("zoo-status").innerHTML = document.title + " is now open!";

        }

    </script 
</body>
</html>
