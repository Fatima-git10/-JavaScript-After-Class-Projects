<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {

            font-size: 30px;

        }
    </style>
</head>

<body>
    <h1>JavaScript Array Sort</h1>

    <button onclick="ascending()">Ascending order</button>

    <button onclick="decending()">Decending order</button>

    <p id="items"></p>
    <script>

        var number = [434, 48, 63, 54, 83, 44]

        function ascending() {

            asc = number.sort()

            document.getElementById("items").innerHTML = asc;

        }

        function decending() {

            document.getElementById("items").innerHTML = number.sort((a, b) => b - a);

        }

    </script>
</body>

</html>
